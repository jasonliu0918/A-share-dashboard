name: Update JSL Temperature

on:
  schedule:
    # 07:20 and 16:40 Asia/Shanghai.
    # 07:20 CST is 23:20 UTC on the previous calendar day.
    - cron: "20 23 * * 0-4"
    - cron: "40 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install requests

      - name: Refresh JSL temperature
        run: python gen_jsl_temperature.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- jsl_temperature.js; then
            echo "No JSL temperature change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jsl_temperature.js
          git commit -m "chore: update JSL temperature"
          git push
